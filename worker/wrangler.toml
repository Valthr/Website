name = "valthr-chat-logger"
main = "src/index.js"
compatibility_date = "2026-04-01"

# ─────────────────────────────────────────────────────────────────────────────
# After running `wrangler kv:namespace create LOGS` (see README.md), paste
# the returned `id` value into the binding below.
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "LOGS"
id = "PASTE_KV_NAMESPACE_ID_HERE"

# Optional: pin to your CF account if `wrangler login` resolves multiple.
# account_id = "your-cloudflare-account-id"

# DASHBOARD_TOKEN is set as a secret via:
#   wrangler secret put DASHBOARD_TOKEN
# Do NOT add it to this file.
